<style>
/* ===================== DESIGN TOKENS ===================== */
:root{
  --paper:#E9E7E0;
  --card:#F4F2EC;
  --ink:#14171B;
  --ink-2:#565B62;
  --accent:#2440E6;
  --accent-deep:#1A2DB0;
  --line:rgba(20,23,27,.13);
  --line-strong:rgba(20,23,27,.25);
  --display:"Bricolage Grotesque",system-ui,sans-serif;
  --body:"Inter",system-ui,sans-serif;
  --mono:"Space Mono",ui-monospace,monospace;
  --maxw:1180px;
  --pad:clamp(20px,5vw,72px);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  background:var(--paper);
  color:var(--ink);
  font-family:var(--body);
  font-size:17px;
  line-height:1.6;
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
}
a{color:inherit;text-decoration:none}
img{display:block;max-width:100%}
.wrap{max-width:var(--maxw);margin:0 auto;padding-left:var(--pad);padding-right:var(--pad)}
.mono{font-family:var(--mono);font-size:.72rem;letter-spacing:.14em;text-transform:uppercase}
.accent{color:var(--accent)}

/* ===================== NAV ===================== */
nav{
  position:sticky;top:0;z-index:50;
  background:rgba(233,231,224,.82);
  backdrop-filter:blur(10px);
  border-bottom:1px solid var(--line);
}
.nav-inner{display:flex;align-items:center;justify-content:space-between;height:64px;
  max-width:var(--maxw);margin:0 auto;padding-left:var(--pad);padding-right:var(--pad)}
.brand{font-family:var(--display);font-weight:800;font-size:1.15rem;letter-spacing:-.01em;display:flex;align-items:center;gap:.5rem}
.brand .dot{width:9px;height:9px;border-radius:50%;background:var(--accent);display:inline-block}
.nav-links{display:flex;align-items:center;gap:1.6rem}
.nav-links a:not(.btn){font-size:.9rem;color:var(--ink-2);transition:color .2s}
.nav-links a:not(.btn):hover{color:var(--ink)}
.btn{display:inline-flex;align-items:center;gap:.5rem;background:var(--ink);color:var(--paper);
  font-weight:600;font-size:.88rem;padding:.6rem 1.1rem;border-radius:999px;transition:transform .2s,background .2s}
.btn:hover{background:var(--accent);transform:translateY(-1px)}
.btn.ghost{background:transparent;color:var(--ink);border:1px solid var(--line-strong)}
.btn.ghost:hover{background:var(--ink);color:var(--paper)}
.nav-toggle{display:none;background:none;border:0;cursor:pointer;font-family:var(--mono);font-size:.75rem;letter-spacing:.1em;color:var(--ink)}

/* ===================== HERO ===================== */
.hero{padding:clamp(48px,9vw,110px) 0 clamp(36px,5vw,64px)}
.hero-grid{display:grid;grid-template-columns:1.4fr .9fr;gap:clamp(28px,5vw,64px);align-items:center}
.eyebrow{color:var(--ink-2);margin-bottom:1.4rem;display:flex;gap:.7rem;align-items:center}
.eyebrow::before{content:"";width:26px;height:1px;background:var(--ink-2);display:inline-block}
.hero h1{font-family:var(--display);font-weight:800;line-height:.92;letter-spacing:-.025em;
  font-size:clamp(2.9rem,8.5vw,6.2rem);margin-bottom:.5rem}
.hero .role{font-family:var(--display);font-weight:600;font-size:clamp(1.2rem,3vw,1.9rem);
  color:var(--accent);line-height:1.05;margin-bottom:1.5rem;letter-spacing:-.01em}
.hero .lead{font-size:clamp(1rem,1.4vw,1.18rem);color:var(--ink-2);max-width:30ch;margin-bottom:2rem}
.hero-cta{display:flex;gap:.8rem;flex-wrap:wrap;margin-bottom:2.2rem}
.stats{display:flex;gap:clamp(1.4rem,3vw,2.6rem);flex-wrap:wrap}
.stat .n{font-family:var(--display);font-weight:700;font-size:1.7rem;line-height:1}
.stat .l{color:var(--ink-2);font-size:.78rem;margin-top:.25rem;font-family:var(--mono);letter-spacing:.08em;text-transform:uppercase}
.portrait{position:relative}
.portrait .frame{position:relative;border-radius:14px;overflow:hidden;background:var(--card);aspect-ratio:1/1}
.portrait img{width:100%;height:100%;object-fit:cover}
.portrait::before{content:"";position:absolute;inset:14px -14px -14px 14px;border:1px solid var(--accent);border-radius:14px;z-index:-1}
.portrait .tag{position:absolute;left:14px;bottom:14px;background:var(--ink);color:var(--paper);
  font-family:var(--mono);font-size:.66rem;letter-spacing:.12em;text-transform:uppercase;padding:.4rem .7rem;border-radius:7px}

/* ===================== MARQUEE ===================== */
.marquee{border-top:1px solid var(--line);border-bottom:1px solid var(--line);
  padding:1.1rem 0;overflow:hidden;background:var(--ink);color:var(--paper)}
.marquee-track{display:flex;gap:3rem;white-space:nowrap;width:max-content;animation:scroll 32s linear infinite}
.marquee:hover .marquee-track{animation-play-state:paused}
.marquee-item{font-family:var(--display);font-weight:600;font-size:1.15rem;display:flex;align-items:center;gap:3rem}
.marquee-item::after{content:"◆";color:var(--accent);font-size:.7rem}
@keyframes scroll{from{transform:translateX(0)}to{transform:translateX(-50%)}}

/* ===================== SECTION SHELL ===================== */
section.block{padding:clamp(56px,8vw,108px) 0}
.sec-head{display:flex;align-items:baseline;gap:1rem;margin-bottom:clamp(2rem,4vw,3.4rem);
  border-bottom:1px solid var(--line);padding-bottom:1.1rem;flex-wrap:wrap}
.sec-head .idx{font-family:var(--mono);font-size:.72rem;color:var(--accent);letter-spacing:.12em}
.sec-head h2{font-family:var(--display);font-weight:700;font-size:clamp(1.6rem,3.6vw,2.5rem);letter-spacing:-.02em;flex:1}
.sec-head .note{color:var(--ink-2);font-size:.9rem;max-width:34ch}

/* ===================== ABOUT ===================== */
.about-grid{display:grid;grid-template-columns:1fr 1fr;gap:clamp(2rem,5vw,4rem)}
.about-lead{font-family:var(--display);font-weight:600;font-size:clamp(1.25rem,2.5vw,1.7rem);line-height:1.3;letter-spacing:-.01em}
.about-body p{color:var(--ink-2);margin-bottom:1rem}
.chips{display:flex;flex-wrap:wrap;gap:.5rem;margin-top:1.4rem}
.chip{font-family:var(--mono);font-size:.7rem;letter-spacing:.06em;text-transform:uppercase;
  border:1px solid var(--line-strong);padding:.4rem .7rem;border-radius:999px;color:var(--ink-2)}

/* ===================== WORK / SELECTED ===================== */
.work-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:clamp(1rem,2.5vw,1.6rem)}
.proj{background:var(--card);border:1px solid var(--line);border-radius:14px;overflow:hidden;
  display:flex;flex-direction:column;transition:transform .25s,box-shadow .25s,border-color .25s}
.proj:hover{transform:translateY(-4px);box-shadow:0 18px 40px -22px rgba(20,23,27,.4);border-color:var(--line-strong)}
.proj .thumb{aspect-ratio:16/10;background:linear-gradient(135deg,#dcd9d0,#eceae3);position:relative;overflow:hidden}
.proj .thumb img{width:100%;height:100%;object-fit:cover}
.proj .thumb .ph{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-family:var(--display);font-weight:800;font-size:2.4rem;color:rgba(20,23,27,.16)}
.proj .body{padding:1.3rem 1.4rem 1.5rem;display:flex;flex-direction:column;gap:.5rem;flex:1}
.proj .ptag{font-family:var(--mono);font-size:.66rem;letter-spacing:.1em;text-transform:uppercase;color:var(--accent)}
.proj h3{font-family:var(--display);font-weight:700;font-size:1.25rem;letter-spacing:-.01em}
.proj p{color:var(--ink-2);font-size:.92rem;flex:1}
.proj .meta{display:flex;justify-content:space-between;align-items:center;margin-top:.4rem;
  font-family:var(--mono);font-size:.7rem;letter-spacing:.06em;color:var(--ink-2);text-transform:uppercase}
.proj .meta .go{color:var(--ink)}
.proj:hover .meta .go{color:var(--accent)}

/* ===================== EXPERIENCE ===================== */
.exp-row{display:grid;grid-template-columns:auto 1.1fr 1.4fr auto;gap:1.4rem;align-items:baseline;
  padding:1.3rem 0;border-bottom:1px solid var(--line);transition:padding-left .25s}
.exp-row:hover{padding-left:.6rem}
.exp-row .r-role{font-family:var(--display);font-weight:700;font-size:1.15rem;letter-spacing:-.01em}
.exp-row .r-co{color:var(--accent);font-size:.95rem}
.exp-row .r-desc{color:var(--ink-2);font-size:.92rem}
.exp-row .r-when{font-family:var(--mono);font-size:.7rem;letter-spacing:.06em;color:var(--ink-2);text-align:right;white-space:nowrap;text-transform:uppercase}

/* ===================== SERVICES ===================== */
.svc-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--line);
  border:1px solid var(--line);border-radius:14px;overflow:hidden}
.svc{background:var(--paper);padding:clamp(1.4rem,3vw,2.2rem)}
.svc .num{font-family:var(--mono);font-size:.72rem;color:var(--accent);letter-spacing:.1em}
.svc h3{font-family:var(--display);font-weight:700;font-size:1.3rem;margin:.7rem 0 .5rem;letter-spacing:-.01em}
.svc p{color:var(--ink-2);font-size:.9rem}

/* ===================== AGENCY FEATURE ===================== */
.agency{background:var(--ink);color:var(--paper);border-radius:18px;padding:clamp(2rem,5vw,3.6rem);
  display:grid;grid-template-columns:1.3fr .9fr;gap:2rem;align-items:center}
.agency .mono{color:#9aa0a8}
.agency h3{font-family:var(--display);font-weight:800;font-size:clamp(1.8rem,4vw,3rem);letter-spacing:-.02em;margin:.6rem 0 .8rem;line-height:1}
.agency p{color:#c3c7cd;max-width:42ch;margin-bottom:1.6rem}
.agency .btn{background:var(--accent);color:#fff}
.agency .btn:hover{background:#fff;color:var(--ink)}
.agency-side{text-align:right}
.agency-side .big{font-family:var(--display);font-weight:800;font-size:clamp(2.2rem,6vw,4.5rem);line-height:.9;color:var(--accent)}
.agency-side .sub{font-family:var(--mono);font-size:.72rem;letter-spacing:.12em;color:#9aa0a8;text-transform:uppercase;margin-top:.6rem}

/* ===================== PLATFORMS ===================== */
.plat-group{margin-bottom:2.4rem}
.plat-group .gh{font-family:var(--mono);font-size:.72rem;letter-spacing:.12em;text-transform:uppercase;
  color:var(--ink-2);margin-bottom:1rem;display:flex;align-items:center;gap:.6rem}
.plat-group .gh::after{content:"";flex:1;height:1px;background:var(--line)}
.plat-list{display:grid;grid-template-columns:repeat(3,1fr);gap:.6rem}
.plat{display:flex;align-items:center;justify-content:space-between;padding:.95rem 1.1rem;
  border:1px solid var(--line);border-radius:11px;background:var(--card);transition:border-color .2s,transform .2s,background .2s}
.plat:hover{border-color:var(--accent);transform:translateY(-2px)}
.plat .pname{font-weight:600;font-size:.95rem}
.plat .parrow{font-family:var(--mono);font-size:.85rem;color:var(--ink-2);transition:transform .2s,color .2s}
.plat:hover .parrow{color:var(--accent);transform:translate(2px,-2px)}

/* ===================== CONTACT / FOOTER ===================== */
footer{background:var(--ink);color:var(--paper);padding:clamp(56px,8vw,100px) 0 2.4rem;margin-top:clamp(40px,6vw,80px)}
.foot-cta{display:flex;justify-content:space-between;align-items:flex-end;gap:2rem;flex-wrap:wrap;
  border-bottom:1px solid rgba(255,255,255,.13);padding-bottom:clamp(2rem,5vw,3.4rem);margin-bottom:2.4rem}
.foot-cta h2{font-family:var(--display);font-weight:800;font-size:clamp(2.2rem,7vw,5rem);letter-spacing:-.03em;line-height:.92}
.foot-cta .accent{color:var(--accent)}
.foot-meta{display:grid;grid-template-columns:repeat(4,auto);gap:2rem 3rem;justify-content:space-between}
.foot-meta .fm .k{font-family:var(--mono);font-size:.68rem;letter-spacing:.12em;text-transform:uppercase;color:#9aa0a8;margin-bottom:.4rem}
.foot-meta .fm a,.foot-meta .fm span{color:var(--paper);font-size:.95rem}
.foot-meta .fm a:hover{color:var(--accent)}
.foot-bottom{margin-top:2.6rem;display:flex;justify-content:space-between;flex-wrap:wrap;gap:1rem;
  font-family:var(--mono);font-size:.7rem;letter-spacing:.06em;color:#8a9098;text-transform:uppercase}

/* ===================== AVAILABILITY PILL ===================== */
.status{display:inline-flex;align-items:center;gap:.55rem;border:1px solid var(--line-strong);
  border-radius:999px;padding:.4rem .85rem;margin-bottom:1.4rem;
  font-family:var(--mono);font-size:.68rem;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-2)}
.status .live{width:8px;height:8px;border-radius:50%;background:#1fb866;position:relative}
.status .live::after{content:"";position:absolute;inset:-4px;border-radius:50%;border:1.5px solid #1fb866;opacity:.5;animation:pulse 2.2s ease-out infinite}
@keyframes pulse{0%{transform:scale(.8);opacity:.6}100%{transform:scale(2);opacity:0}}

/* ===================== PRINCIPLES / TRUST ===================== */
.prin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:clamp(1.4rem,3vw,2.6rem)}
.prin{border-top:2px solid var(--ink);padding-top:1.2rem}
.prin .pk{font-family:var(--mono);font-size:.7rem;letter-spacing:.1em;color:var(--accent);margin-bottom:.9rem}
.prin h3{font-family:var(--display);font-weight:700;font-size:1.3rem;letter-spacing:-.01em;margin-bottom:.5rem}
.prin p{color:var(--ink-2);font-size:.95rem}

/* ===================== WHATSAPP BUTTON (in contact) ===================== */
.btn.wa{background:#1faf54;color:#fff}
.btn.wa:hover{background:#178f44}
.btn.wa svg{width:18px;height:18px;fill:currentColor}

/* ===================== FLOATING WHATSAPP BUBBLE ===================== */
.wa-fab{position:fixed;right:clamp(16px,3vw,28px);bottom:clamp(16px,3vw,28px);z-index:80;
  display:inline-flex;align-items:center;gap:.6rem;background:#1faf54;color:#fff;
  padding:.85rem 1.05rem;border-radius:999px;box-shadow:0 12px 30px -10px rgba(31,175,84,.6);
  font-weight:600;font-size:.92rem;transition:transform .2s,box-shadow .2s,background .2s}
.wa-fab:hover{background:#178f44;transform:translateY(-2px);box-shadow:0 16px 34px -10px rgba(31,175,84,.7)}
.wa-fab svg{width:24px;height:24px;fill:currentColor;flex-shrink:0}
.wa-fab .wa-label{white-space:nowrap}
@media(max-width:600px){.wa-fab .wa-label{display:none}.wa-fab{padding:.9rem}}

/* ===================== REVEAL ===================== */
.reveal{opacity:0;transform:translateY(22px);transition:opacity .7s ease,transform .7s ease}
.reveal.in{opacity:1;transform:none}

/* ===================== RESPONSIVE ===================== */
@media(max-width:880px){
  .hero-grid{grid-template-columns:1fr}
  .portrait{max-width:320px;order:-1}
  .about-grid{grid-template-columns:1fr;gap:1.6rem}
  .svc-grid{grid-template-columns:1fr}
  .prin-grid{grid-template-columns:1fr;gap:1.6rem}
  .agency{grid-template-columns:1fr}
  .agency-side{text-align:left}
  .work-grid{grid-template-columns:1fr}
  .plat-list{grid-template-columns:1fr 1fr}
  .exp-row{grid-template-columns:1fr;gap:.3rem}
  .exp-row .r-when{text-align:left}
  .foot-meta{grid-template-columns:1fr 1fr}
  .nav-links a:not(.btn){display:none}
}
@media(max-width:520px){
  .plat-list{grid-template-columns:1fr}
  .foot-meta{grid-template-columns:1fr}
}
@media(prefers-reduced-motion:reduce){
  *{animation:none!important;scroll-behavior:auto!important}
  .reveal{opacity:1;transform:none}
}
</style>

/* ===================================================================== */
/*  ⚙️  RENDERER — you don't need to edit anything below this line.       */
/* ===================================================================== */
const esc = s => String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");

function render(){
  const d = DATA;
  const app = document.getElementById("app");

  const nav = `
  <nav><div class="nav-inner">
    <a href="#top" class="brand"><span class="dot"></span>${esc(d.name)}</a>
    <div class="nav-links">
      <a href="#work">Work</a>
      <a href="#about">About</a>
      <a href="#how">How I work</a>
      <a href="#services">Services</a>
      <a href="#links">Links</a>
      <a href="#contact" class="btn">Let's talk</a>
    </div>
  </div></nav>`;

  const stats = d.stats.map(s=>`<div class="stat"><div class="n">${esc(s.n)}</div><div class="l">${esc(s.l)}</div></div>`).join("");
  const hero = `
  <header id="top" class="hero"><div class="wrap"><div class="hero-grid">
    <div class="reveal">
      <div class="status"><span class="live"></span>${esc(d.availability)}</div>
      <div class="eyebrow mono">Portfolio — ${esc(d.location)}</div>
      <h1>${esc(d.name)}</h1>
      <div class="role">${esc(d.role)}</div>
      <p class="lead">${esc(d.lead)}</p>
      <div class="hero-cta">
        <a href="#work" class="btn">View work</a>
        <a href="#contact" class="btn ghost">Get in touch</a>
      </div>
      <div class="stats">${stats}</div>
    </div>
    <div class="portrait reveal">
      <div class="frame"><img src="${esc(d.photo)}" alt="${esc(d.name)}"></div>
      <span class="tag">${esc(d.role)}</span>
    </div>
  </div></div></header>`;

  const toolItems = d.tools.map(t=>`<span class="marquee-item">${esc(t)}</span>`).join("");
  const marquee = `<div class="marquee"><div class="marquee-track">${toolItems}${toolItems}</div></div>`;

  const chips = d.expertise.map(e=>`<span class="chip">${esc(e)}</span>`).join("");
  const aboutBody = d.aboutBody.map(p=>`<p>${esc(p)}</p>`).join("");
  const about = `
  <section id="about" class="block"><div class="wrap">
    <div class="sec-head reveal"><span class="idx">01</span><h2>About</h2></div>
    <div class="about-grid">
      <div class="about-lead reveal">${esc(d.aboutLead)}</div>
      <div class="about-body reveal">${aboutBody}<div class="chips">${chips}</div></div>
    </div>
  </div></section>`;

  const projects = d.projects.map(p=>{
    const thumb = p.image
      ? `<img src="${esc(p.image)}" alt="${esc(p.title)}">`
      : `<div class="ph">${esc(p.title.slice(0,2).toUpperCase())}</div>`;
    return `<a class="proj reveal" href="${esc(p.link)}" target="_blank" rel="noopener">
      <div class="thumb">${thumb}</div>
      <div class="body">
        <span class="ptag">${esc(p.tag)}</span>
        <h3>${esc(p.title)}</h3>
        <p>${esc(p.desc)}</p>
        <div class="meta"><span>${esc(p.year)}</span><span class="go">View ↗</span></div>
      </div></a>`;
  }).join("");
  const work = `
  <section id="work" class="block"><div class="wrap">
    <div class="sec-head reveal"><span class="idx">02</span><h2>Selected work</h2>
      <span class="note">A snapshot — see the platform links below for full galleries.</span></div>
    <div class="work-grid">${projects}</div>
  </div></section>`;

  const exp = d.experience.map(e=>`
    <div class="exp-row reveal">
      <div class="r-role">${esc(e.role)}</div>
      <div class="r-co">${esc(e.co)}</div>
      <div class="r-desc">${esc(e.desc)}</div>
      <div class="r-when">${esc(e.when)}</div>
    </div>`).join("");
  const experience = `
  <section id="experience" class="block"><div class="wrap">
    <div class="sec-head reveal"><span class="idx">03</span><h2>Experience</h2></div>
    <div>${exp}</div>
  </div></section>`;

  const svc = d.services.map((s,i)=>`
    <div class="svc reveal"><div class="num">0${i+1}</div><h3>${esc(s.t)}</h3><p>${esc(s.d)}</p></div>`).join("");
  const services = `
  <section id="services" class="block"><div class="wrap">
    <div class="sec-head reveal"><span class="idx">04</span><h2>What I do</h2>
      <span class="note">Services available through me directly or via my agency.</span></div>
    <div class="svc-grid">${svc}</div>
  </div></section>`;

  const prin = d.principles.map((p,i)=>`
    <div class="prin reveal"><div class="pk">0${i+1}</div><h3>${esc(p.t)}</h3><p>${esc(p.d)}</p></div>`).join("");
  const principles = `
  <section id="how" class="block"><div class="wrap">
    <div class="sec-head reveal"><span class="idx">05</span><h2>How I work</h2>
      <span class="note">Good work starts with trust. Here's what you can count on.</span></div>
    <div class="prin-grid">${prin}</div>
  </div></section>`;

  const agency = `
  <section class="block"><div class="wrap"><div class="agency reveal">
    <div>
      <div class="mono">${esc(d.agency.tagline)}</div>
      <h3>${esc(d.agency.name)}</h3>
      <p>${esc(d.agency.blurb)}</p>
      <a class="btn" href="${esc(d.agency.link)}" target="_blank" rel="noopener">Visit the agency ↗</a>
    </div>
    <div class="agency-side"><div class="big">${esc(d.agency.bigword)}</div>
      <div class="sub">Creative · Brand · 3D</div></div>
  </div></div></section>`;

  const platforms = d.platformGroups.map(g=>{
    const links = g.links.map(l=>`
      <a class="plat" href="${esc(l.url)}" target="_blank" rel="noopener">
        <span class="pname">${esc(l.name)}</span><span class="parrow">↗</span></a>`).join("");
    return `<div class="plat-group reveal"><div class="gh">${esc(g.group)}</div><div class="plat-list">${links}</div></div>`;
  }).join("");
  const links = `
  <section id="links" class="block"><div class="wrap">
    <div class="sec-head reveal"><span class="idx">06</span><h2>Find me online</h2>
      <span class="note">Full galleries, experiments, and day-to-day work.</span></div>
    ${platforms}
  </div></section>`;

  const waMsg = encodeURIComponent("Hi Arafat, I saw your portfolio and would like to talk about a project.");
  const waLink = `https://wa.me/${d.whatsapp}?text=${waMsg}`;
  const waIcon = `<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M.057 24l1.687-6.163a11.867 11.867 0 0 1-1.587-5.945C.16 5.335 5.495 0 12.05 0a11.817 11.817 0 0 1 8.413 3.488 11.824 11.824 0 0 1 3.48 8.414c-.003 6.557-5.338 11.892-11.893 11.892a11.9 11.9 0 0 1-5.688-1.448L.057 24zm6.597-3.807c1.676.995 3.276 1.591 5.392 1.592 5.448 0 9.886-4.434 9.889-9.885.002-5.462-4.415-9.89-9.881-9.892-5.452 0-9.887 4.434-9.889 9.884a9.86 9.86 0 0 0 1.633 5.443l-.999 3.648 3.755-.99zm11.387-5.464c-.074-.124-.272-.198-.57-.347-.297-.149-1.758-.868-2.031-.967-.272-.099-.47-.149-.669.149-.198.297-.768.967-.941 1.165-.173.198-.347.223-.644.074-.297-.149-1.255-.462-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.297-.347.446-.521.151-.172.2-.296.3-.495.099-.198.05-.372-.025-.521-.075-.148-.669-1.611-.916-2.206-.242-.579-.487-.501-.669-.51l-.57-.01c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.263.489 1.694.626.712.226 1.36.194 1.872.118.571-.085 1.758-.719 2.006-1.413.248-.695.248-1.29.173-1.414z"/></svg>`;

  const footer = `
  <footer id="contact"><div class="wrap">
    <div class="foot-cta reveal">
      <h2>Let's make<br>something<span class="accent">.</span></h2>
      <div style="display:flex;gap:.7rem;flex-wrap:wrap">
        <a class="btn wa" href="${waLink}" target="_blank" rel="noopener">${waIcon} Chat on WhatsApp</a>
        <a class="btn" href="mailto:${esc(d.email)}" style="background:var(--accent);color:#fff">Email me ↗</a>
      </div>
    </div>
    <div class="foot-meta">
      <div class="fm"><div class="k">WhatsApp</div><a href="${waLink}" target="_blank" rel="noopener">${esc(d.phone)}</a></div>
      <div class="fm"><div class="k">Email</div><a href="mailto:${esc(d.email)}">${esc(d.email)}</a></div>
      <div class="fm"><div class="k">Location</div><span>${esc(d.location)}</span></div>
      <div class="fm"><div class="k">Agency</div><a href="${esc(d.agency.link)}" target="_blank" rel="noopener">${esc(d.agency.name)} ↗</a></div>
    </div>
    <div class="foot-bottom">
      <span>© <span id="yr"></span> ${esc(d.name)}</span>
      <span>www.thearafatgazi.com</span>
    </div>
  </div></footer>
  <a class="wa-fab" href="${waLink}" target="_blank" rel="noopener" aria-label="Chat on WhatsApp">${waIcon}<span class="wa-label">WhatsApp</span></a>`;

  app.innerHTML = nav + hero + marquee + about + work + experience + services + principles + agency + links + footer;
  const yr = document.getElementById("yr"); if(yr) yr.textContent = new Date().getFullYear();

  // scroll reveal
  const io = new IntersectionObserver((entries)=>{
    entries.forEach(e=>{ if(e.isIntersecting){ e.target.classList.add("in"); io.unobserve(e.target);} });
  },{threshold:.12});
  document.querySelectorAll(".reveal").forEach(el=>io.observe(el));
}
render();
</script>
</body>
